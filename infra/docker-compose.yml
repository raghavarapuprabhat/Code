services:
  postgres:
    image: postgres:16-alpine
    container_name: aiagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiagent
      POSTGRES_PASSWORD: aiagent_local_password
      POSTGRES_DB: aiagent
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./seed:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiagent -d aiagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:latest
    container_name: aiagent-chroma
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

volumes:
  pgdata:
  chromadata:
