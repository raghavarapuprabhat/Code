agent:
  name: sre_agent
  version: 0.1.0

llm:
  provider: anthropic
  model: claude-opus-4-7
  temperature: 0.1
  max_tokens: 2048
  api_key_env: ANTHROPIC_API_KEY

storage:
  postgres_url_env: DATABASE_URL
  chroma_path: ""

memory:
  recent_window: 4
  summarize_every: 6

sre:
  rag_top_k: 6
  max_followup_rounds: 3
  confidence_threshold: 0.7
  csv_max_rows: 500
