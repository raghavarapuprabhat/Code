agent:
  name: code_doc_agent
  version: 0.1.0

llm:
  provider: anthropic
  model: claude-opus-4-7
  temperature: 0.2
  max_tokens: 4096
  api_key_env: ANTHROPIC_API_KEY
  # Uncomment to enable Ollama fallback when Anthropic is unreachable:
  # fallback:
  #   provider: ollama
  #   model: llama3.1:70b
  #   base_url: http://localhost:11434
  #   api_key_env: ""

storage:
  postgres_url_env: DATABASE_URL
  chroma_path: ""        # leave empty to use docker-compose Chroma at localhost:8001
  # v0.2: generated docs are stored in Postgres (generated_docs) + Chroma (docs_<pid>),
  # not written to disk. `output_subdir` removed.

memory:
  recent_window: 3
  summarize_every: 5

code_doc:
  languages: [java, javascript, typescript, jsx, tsx]
  ignore_patterns:
    - "node_modules/**"
    - "target/**"
    - "build/**"
    - "dist/**"
    - ".git/**"
    - ".venv/**"
    - "__pycache__/**"
    - ".docs/**"
    # --- Test code: excluded from documentation analysis (all 3 languages). ---
    # Test folders (Maven/Gradle, JS, Python conventions)
    - "src/test/**"
    - "**/test/**"
    - "**/tests/**"
    - "**/__tests__/**"
    - "**/__mocks__/**"
    - "**/testing/**"
    # JS/TS test + spec files
    - "**/*.test.*"
    - "**/*.spec.*"
    - "*.test.*"
    - "*.spec.*"
    # Java test files (JUnit conventions)
    - "**/*Test.java"
    - "**/*Tests.java"
    - "**/*IT.java"
    - "*Test.java"
    - "*Tests.java"
    - "*IT.java"
    # Python test files
    - "**/test_*.py"
    - "**/*_test.py"
    - "test_*.py"
    - "*_test.py"
  max_verify_loops: 3
  chunk_size_tokens: 8000
  parallel_files: 4

  # --- v0.4 architecture reconstruction (§8.8) ---
  doc_critique: true            # LLM-as-judge quality gate before persist
  max_critique_loops: 2
  # Which docs to critique (default: arch-reconstruction + management overview).
  # critique_docs: [02_architecture, 09_deployment_infra, 10_architecture_decisions, ...]

  # --- v0.5 enrichment (§8.9) — all skippable ---
  doc_eval: true                # golden-Q&A eval after each index
  dependency_audit: true        # npm audit / OWASP — auto-skips when binary absent
  # requirements_areapath is provided per-project via the API, not config.
